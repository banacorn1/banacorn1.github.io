<!-- 长烟 -->
<!DOCTYPE html>
<html>
	<head>
		<title>长烟的小窝</title>
		<meta charset = "utf-8">
		<style>
			body{
				margin:0;
			}
			.login_in{
				height:480px;
				width:290px;
				margin:0 auto;
				text-align:center;
				background-color:rgba(255,255,255,0);
				position:relative;
				z-index:99;
			}
			.button1{
				height:50px;
				width:100px;
				display:block;
				margin:0 auto;
				margin-top:50px;
			}
			.headimg{
				height:120px;
				width:120px;
			}
			.game_camp{
				height:50px;
				width:290px;
				margin-top:150px;
			}
			video{
				width:100%;
				height:auto;
				x-index:-9999;
				position:fixed;
				min-height:100%;
				min-width:100%;
				height:auto;
				right: 0;
				bottom: 0;
				position:absolute;
				margin:0px auto;
			} 
		</style>
		<script>
			function  button_click(){
				window.location.href="./main.html"; 
			}
		</script>
	</head>
	<body>
	<div>
		<div class = "login_in">
				<img class = "headimg" src = "./头像.png">
				<button class = "button1" onclick = "button_click()">GO!</button>
				<div class ="game_camp">
					<p style = "font-size:30px;font-family:包图小白体;color:#ffffff;">明日之后</p>
					<p style = "font-size:20px;font-family:包图小白体;color:#ffffff;">斯利尔城-长烟</p>
				</div>
			</div>
			 <video src = "video1.mp4" loop="loop" autoplay="autoplay" ></video> 
		</div>
	</body>
</html>
